version: '3.8'

services:
  backend:
    build: ./backend
    networks:
      - app-network
    restart: always
    environment:
      - TZ=${TZ:-UTC}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    volumes:
      - /etc/localtime:/etc/localtime:ro

  frontend:
    build: ./frontend
    networks:
      - app-network
    restart: always
    environment:
      - TZ=${TZ:-UTC}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/NVMe/Apps/GM-Vehicles/public:/app/public:ro

  nginx:
    image: nginx:stable
    networks:
      front-macvlan:
        ipv4_address: 192.168.1.50
      app-network: {}
      gramps-net: {}
      nextcloud-net: {}
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - /mnt/NVMe/Apps/GM-Vehicles/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /mnt/NVMe/Apps/GM-Vehicles/public:/usr/share/nginx/html:ro 
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    restart: always

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run
    networks:
      - app-network
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy

networks:
  app-network:
    driver: bridge
  front-macvlan:
    external: true
  gramps-net:
    name: ix-internal-gramps-web-gramps-net
    external: true
  nextcloud-net:
    name: ix-internal-nextcloud-nextcloud-net
    external: true
