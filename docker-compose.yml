services:
  backend:
    build: ./backend
    networks:
      - app-network
    restart: always
    environment:
      - TZ=${TZ:-UTC}
      - DB_HOST
      - DB_USER
      - DB_PASS
      - DB_NAME
    volumes:
      - /etc/localtime:/etc/localtime:ro

  frontend:
    build: ./frontend
    networks:
      - app-network
    restart: always
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - /etc/localtime:/etc/localtime:ro

  nginx:
    image: nginx:stable
    networks:
      front-macvlan:
        ipv4_address: 192.168.1.50
      app-network: {}
      gramps-net: {}
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - /mnt/NVMe/Apps/GM-Vehicles/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /mnt/NVMe/Apps/GM-Vehicles/certbot/conf:/etc/letsencrypt
      - /mnt/NVMe/Apps/GM-Vehicles/certbot/www:/var/www/certbot
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - frontend
      - backend
    restart: always

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /mnt/NVMe/Apps/GM-Vehicles/certbot/conf:/etc/letsencrypt
      - /mnt/NVMe/Apps/GM-Vehicles/certbot/www:/var/www/certbot
      - /etc/localtime:/etc/localtime:ro
    entrypoint: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done'"
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  front-macvlan:
    external: true
  gramps-net:
    name: ix-internal-gramps-web-gramps-net
    external: true
