version: '3.8'

services:
  backend:
    build: ./backend
    networks:
      - app-network
    restart: always
    environment:
      - TZ=${TZ:-UTC}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    volumes:
      - /etc/localtime:/etc/localtime:ro

  frontend:
    build: ./frontend
    networks:
      - app-network
    restart: always
    environment:
      - TZ=${TZ:-UTC}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/NVMe/Apps/GM-Vehicles/window-stickers:/stickers:ro

  nginx:
    image: nginx:stable
    networks:
      app-network:
        ipv4_address: 172.22.0.10
      gramps-net: {}
      nextcloud-net: {}
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - /mnt/NVMe/Apps/GM-Vehicles/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - frontend
      - backend
    restart: always

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    networks:
      - app-network
      - gramps-net
      - nextcloud-net
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
  gramps-net:
    name: ix-internal-gramps-web-gramps-net
    external: true
  nextcloud-net:
    name: ix-internal-nextcloud-nextcloud-net
    external: true
